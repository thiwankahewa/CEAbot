/**:
  ros__parameters:
    general:
      pub_frame_rate: 1.0
      grab_resolution: "HD2K"
      pub_downscale_factor: 1.0
      publish_status: false
      grab_frame_rate: 15

    video:
      enable_24bit_output: true

    sensors:
      publish_imu_tf: false
      publish_imu: false

    depth:
      depth_mode: "NEURAL_PLUS"
      point_cloud_freq: 1.0
      depth_stabilization: 0
      depth_confidence: 95
      depth_texture_conf: 80
      max_depth: 1.5

    pos_tracking:
      pos_tracking_enabled: false
      imu_fusion: false
      publish_tf: false
      publish_map_tf: false
      area_memory: false
      publish_odom_pose: false

    gnss_fusion:
      publish_utm_tf: false
